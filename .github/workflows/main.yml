# This is a basic workflow to help you get started with Actions

name: ngsrelatev2

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest] #, macos-13]
    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: dependencies (ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libhts-dev
      # - name: dependencies (macos)
      #   if: startsWith(matrix.os, 'macos')
      #   run: |
      #     HOMEBREW_NO_AUTO_UPDATE=1 brew install htslib || HOMEBREW_NO_AUTO_UPDATE=1 brew install htslib
      # Runs a set of commands using the runners shell
      - name: Compile ngsRelate
        run: |
          make HTSSRC=systemwide
      - name: Smoke test version output
        run: |
          ./ngsRelate 2>&1 | head -n 3
      - name: Run tests
        run: |
          make test
      - name: Upload test outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-odir-${{ matrix.os }}
          path: |
            ngsRelate
            test/odir
            test/test1.sh.log
